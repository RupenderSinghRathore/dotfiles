# More option see https://github.com/DreamMaoMao/mango/wiki/

source=~/.config/mango/autostart.conf

# Window effect
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 0
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

border_radius=0
no_radius_when_single=0
focused_opacity=1.0
unfocused_opacity=1.0

# Animation Configuration(support type:zoom,slide)
# tag_animation_direction: 1-horizontal,0-vertical
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=0
animation_fade_out=0
tag_animation_direction=1
# zoom_initial_ratio=0.4
# zoom_end_ratio=0.8
zoom_initial_ratio=1
zoom_end_ratio=1
# fadein_begin_opacity=0.5
# fadeout_begin_opacity=0.8
fadein_begin_opacity=1
fadeout_begin_opacity=1
animation_duration_move=200
animation_duration_open=0
animation_duration_tag=350
animation_duration_close=0
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=20
scroller_default_proportion=0.8
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Dwindle Layout Setting
dwindle_smart_split=0
dwindle_drop_simple_split=1
dwindle_manual_split=0
dwindle_hsplit=1
dwindle_vsplit=1
dwindle_preserve_split=0

# Overview Setting
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
cursor_size=24
drag_tile_to_tile=1
drag_tile_small=1

# keyboard
repeat_rate=25
repeat_delay=600
numlockon=0
xkb_rules_layout=us

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=0
swipe_min_threshold=1

# mouse
# need relogin to make it apply
mouse_natural_scrolling=0

# Appearance
gappih=0
gappiv=0
gappoh=0
gappov=0
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=0
rootcolor=0x201b14ff
bordercolor=0x444444ff
dropcolor=0x8FBA7C55
splitcolor=0xEB441EFF
focuscolor=0xc9b890ff
maximizescreencolor=0x89aa61ff
urgentcolor=0xad401fff
scratchpadcolor=0x516c93ff
globalcolor=0xb153a7ff
overlaycolor=0x14a57cff

# layout support:
# setlayout /scroller
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:tile
tagrule=id:3,layout_name:tile
tagrule=id:4,layout_name:tile
tagrule=id:5,layout_name:tile
tagrule=id:6,layout_name:tile
tagrule=id:7,layout_name:tile
tagrule=id:8,layout_name:tile
tagrule=id:9,layout_name:tile

# Key Bindings
# key name refer to `xev` or `wev` command output,
# mod keys name: super,ctrl,alt,shift,none

# reload config
bind=SUPER,r,reload_config

# menu and terminal
bind=Alt,space,spawn,rofi -show drun
bind=super,k,spawn,alacritty
bind=SUPER,n,spawn_shell, /home/kami-sama/.local/omarchy/bin/niri-focus nvim
bind=SUPER+SHIFT,n,spawn,alacritty --class 'nvim' -e nvim

# exit
# bind=SUPER,q,quit
bind=Super,w,killclient,

# switch window focus
bind=SUPER,Tab,focusstack,next
bind=alt,h,focusdir,left
bind=alt,l,focusdir,right
bind=alt,k,focusdir,up
bind=alt,j,focusdir,down

# swap window
bind=SUPER+SHIFT,Up,exchange_client,up
bind=SUPER+SHIFT,Down,exchange_client,down
bind=SUPER+SHIFT,Left,exchange_client,left
bind=SUPER+SHIFT,Right,exchange_client,right

# switch window status
bind=SUPER,g,toggleglobal,
bind=ALT,Tab,toggleoverview,
bind=ALT,backslash,togglefloating,
bind=Super,return,togglemaximizescreen,
bind=ALT,f,togglefullscreen,
bind=ALT+SHIFT,f,togglefakefullscreen,
bind=SUPER,i,minimized,
bind=SUPER,o,toggleoverlay,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# scroller layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=alt+super+ctrl,Left,scroller_stack,left
bind=alt+super+ctrl,Right,scroller_stack,right
bind=alt+super+ctrl,Up,scroller_stack,up
bind=alt+super+ctrl,Down,scroller_stack,down

#dwindle layout(manual split mode)
bind=alt+shift,Return,dwindle_toggle_split_direction

# switch layout
bind=SUPER+Ctrl,n,switch_layout

# tag switch
bind=SUPER,Left,viewtoleft,0
bind=CTRL,Left,viewtoleft_have_client,0
bind=SUPER,Right,viewtoright,0
bind=CTRL,Right,viewtoright_have_client,0
bind=CTRL+SUPER,Left,tagtoleft,0
bind=CTRL+SUPER,Right,tagtoright,0

bind=Super,1,view,1,0
bind=Super,2,view,2,0
bind=Super,3,view,3,0
bind=Super,4,view,4,0
bind=Super,5,view,5,0
bind=Super,6,view,6,0
bind=Super,7,view,7,0
bind=Super,8,view,8,0
bind=Super,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=Super+Shift,1,tag,1,0
bind=Super+Shift,2,tag,2,0
bind=Super+Shift,3,tag,3,0
bind=Super+Shift,4,tag,4,0
bind=Super+Shift,5,tag,5,0
bind=Super+Shift,6,tag,6,0
bind=Super+Shift,7,tag,7,0
bind=Super+Shift,8,tag,8,0
bind=Super+Shift,9,tag,9,0

# monitor switch
monitorrule=name:^eDP-1$,width:1920,height:1080,refresh:60,x:0,y:0,scale:1.333333
bind=alt+shift,Left,focusmon,left
bind=alt+shift,Right,focusmon,right
bind=SUPER+Alt,Left,tagmon,left
bind=SUPER+Alt,Right,tagmon,right

# gaps
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# movewin
bind=CTRL+SHIFT,Up,movewin,+0,-50
bind=CTRL+SHIFT,Down,movewin,+0,+50
bind=CTRL+SHIFT,Left,movewin,-50,+0
bind=CTRL+SHIFT,Right,movewin,+50,+0

# resizewin
bind=CTRL+ALT,Up,resizewin,+0,-50
bind=CTRL+ALT,Down,resizewin,+0,+50
bind=CTRL+ALT,Left,resizewin,-50,+0
bind=CTRL+ALT,Right,resizewin,+50,+0

# Mouse Button Bindings
# btn_left and btn_right can't bind none mod key
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
mousebind=SUPER,btn_right,moveresize,curresize


# Axis Bindings
axisbind=SUPER,Up,viewtoleft_have_client
axisbind=SUPER,Down,viewtoright_have_client


# layer rule
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi


# noctilia shell 

# Clipboard Manager
bind=super,x,spawn_shell,qs -c noctalia-shell ipc call launcher clipboard

# Settings
bind=alt,s,spawn_shell,qs -c noctalia-shell ipc call settings toggle

# Power Menu
bind=super,escape,spawn_shell,qs -c noctalia-shell ipc call sessionMenu toggle

# Control Centre
bind=super,return,spawn_shell,qs -c noctalia-shell ipc call controlCenter toggle

# Notification Center
bind=super,n,spawn_shell,qs -c noctalia-shell ipc call notifications toggleHistory

# Dismiss Notification
bind=super+shift,n,spawn_shell,qs -c noctalia-shell ipc call notifications toggleHistory

# Toggle DND
bind=super+ctrl,n,spawn_shell,qs -c noctalia-shell ipc call notifications toggleDND

# Dismiss All Notifications
bind=super,comma,spawn_shell,qs -c noctalia-shell ipc call notifications dismissAll

# Wallpaper Browser
bind=super+shift,y,spawn_shell,qs -c noctalia-shell ipc call wallpaper toggle

# Notepad
bind=alt+shift,n,spawn_shell,qs -c noctalia-shell ipc call notepad toggle

# Lock Screen
bind=super+ctrl,l,spawn_shell,qs -c noctalia-shell ipc call lockScreen lock

# Toggle Night Mode
bind=super+ctrl,n,spawn_shell,qs -c noctalia-shell ipc call nightLight toggle

# System Monitor
bind=super+ctrl,t,spawn_shell,qs -c noctalia-shell ipc call systemMonitor toggle

# Toggle Bar
bind=super,j,spawn_shell,qs -c noctalia-shell ipc call bar toggle

# Calendar
bind=super,c,spawn_shell,qs -c noctalia-shell ipc call calendar toggle

# Audio Controls
bind=none,XF86AudioRaiseVolume,spawn_shell,qs -c noctalia-shell ipc call volume increase
bind=none,XF86AudioLowerVolume,spawn_shell,qs -c noctalia-shell ipc call volume decrease
bind=none,XF86AudioMute,spawn_shell,qs -c noctalia-shell ipc call volume muteOutput
bind=none,XF86AudioMicMute,spawn_shell,qs -c noctalia-shell ipc call volume muteInput

# Media Controls
bind=none,XF86AudioNext,spawn_shell,playerctl next
bind=none,XF86AudioPrev,spawn_shell,playerctl previous
bind=none,XF86AudioPlay,spawn_shell,playerctl play-pause
bind=none,XF86AudioPause,spawn_shell,playerctl play-pause

# Brightness Controls
bind=none,XF86MonBrightnessUp,spawn_shell,qs -c noctalia-shell ipc call brightness increase
bind=none,XF86MonBrightnessDown,spawn_shell,qs -c noctalia-shell ipc call brightness decrease
