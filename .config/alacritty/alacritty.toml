# general.import = [ "~/.config/omarchy/current/theme/alacritty.toml" ]
# general.import = [ "~/.local/omarchy/themes/tokyo-night/alacritty.toml" ]
general.import = [ "dank-theme.toml" ]

[terminal.shell]
program = "tmux"
args = ["new-session", "-A", "-s", "main"]

[env]
TERM = "xterm-256color"

[font]
# normal = { family = "CaskaydiaMono Nerd Font", style = "Regular" }
# bold = { family = "CaskaydiaMono Nerd Font", style = "Bold" }
# italic = { family = "CaskaydiaMono Nerd Font", style = "Italic" }
size = 14

[window]
# padding.x = 14
# padding.y = 14
# decorations = "None"
opacity = 0.8

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" },
{ key = "Back",mods = "Control", chars = "\u0017" }
]
