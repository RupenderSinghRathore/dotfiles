[general]
import = ["~/.config/alacritty/themes/noctalia.toml"]

# general.import = [ "~/.config/omarchy/current/theme/alacritty.toml" ]
# general.import = [ "~/.local/omarchy/themes/tokyo-night/alacritty.toml" ]
# general.import = [ "dank-theme.toml" ]

[terminal.shell]
program = "tmux"
args = ["new-session", "-A", "-s", "main"]

[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.normal]
family = "FiraCodeNerdFontMono"
style = "Regular"

[window]
# opacity = 0.85
padding = { x = 0, y = 0 }
dynamic_padding = true
# resize_increments = true
# decorations = "none"

[keyboard]
bindings = [
{ key = "F11", action = "ToggleFullscreen" },
{ key = "Back",mods = "Control", chars = "\u0017" },
{ key = "[",mods = "Control", chars = "\u001b" },
{ key = "Key0", mods = "Control", action = "ResetFontSize" }
]

[colors.cursor]
text = '#000000'
